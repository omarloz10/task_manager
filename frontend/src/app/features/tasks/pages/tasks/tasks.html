<div class="w-screen min-h-screen flex flex-col">
    <div class="flex flex-row items-center justify-between w-full p-4 bg-white shadow-xl">
        <div class="text-center">
            <h1 class="text-2xl font-bold">Task Manager</h1>
            <sub class="text-sm text-gray-400 font-semibold">¡Bienvenido!</sub>
        </div>
        <button (click)="logOut()"
            class="h-10 w-38 text-sm font-semibold border border-gray-300 rounded-xl hover:bg-gray-200 cursor-pointer flex flex-row justify-center items-center">
            <lucide-angular [img]="LogOut" class="me-2" />
            Cerrar Sesión</button>
    </div>

    <div class="w-full p-4 flex justify-center items-center">
        <div class="flex flex-row items-center justify-between w-full sm:w-[80%] lg:w-[70%] pt-4">
            <div class="flex flex-col bg-white w-[25%] h-28 sm:h-25 rounded-2xl shadow-2xl text-center p-4">
                <span class="wrap-break-word">Total</span>
                <span class="text-4xl font-bold"> {{total()}} </span>
            </div>

            <div class="flex flex-col bg-white w-[25%] h-28 sm:h-25 rounded-2xl shadow-2xl text-center p-4">
                <span class="wrap-break-word">Activas</span>
                <span class="text-4xl font-bold text-blue-600"> {{actives()}} </span>
            </div>

            <div class="flex flex-col bg-white w-[25%] h-28 sm:h-25 rounded-2xl shadow-2xl text-center p-4">
                <span class="wrap-break-word">Completadas</span>
                <span class="text-4xl font-bold text-green-600"> {{completed()}} </span>
            </div>
        </div>
    </div>

    <div class="m-4">
        <app-create-task />
    </div>

    <div class="m-4">
        <app-list-task />
    </div>

</div>

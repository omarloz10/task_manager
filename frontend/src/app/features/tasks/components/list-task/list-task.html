<div class="flex flex-col w-full px-4">
    @if (tasks().length == 0) {
    <div
        class="bg-white w-full md:w-[75%] lg:w-[65%] xl:w-[45%] mx-auto h-40 rounded-2xl shadow flex flex-col justify-center items-center my-2">
        <p class="text-2xl font-semibold text-gray-400">No hay tareas todavía</p>
        <sub class="font-semibold text-sm text-gray-300">Crea tu primera tarea para comenzar</sub>
    </div>
    }@else {
    @for (task of tasks(); track task.id) {
    <div
        class="bg-white w-full md:w-[75%] lg:w-[65%] xl:w-[45%] mx-auto min-h-40 rounded-2xl shadow p-4 flex justify-between items-start my-3">

        <!-- izquierda -->
        <div class="flex items-start gap-3">
            <input type="checkbox" class="mt-1" [checked]="task.isCompleted" (change)="onChange(task.id)">

            <div class="">
                <h2 class=" {{task.isCompleted ? 'line-through' : ''}}  text-xl font-semibold uppercase"> {{task.title}}
                </h2>
                <p class="{{task.isCompleted ? 'line-through' : ''}}"> {{task.description}} </p>
            </div>
        </div>

        <!-- derecha -->
        <div class="flex gap-2">
            <lucide-angular [img]="PencilIcon" class="cursor-pointer rounded-lg hover:bg-gray-200 p-1"
                (click)="selectTask(task.id)" />
            <lucide-angular [img]="TrashIcon" class="cursor-pointer text-red-400 rounded-lg hover:bg-red-100 p-1"
                (click)="deleteTask(task.id)" />
        </div>
    </div>
    }
    }
</div>
